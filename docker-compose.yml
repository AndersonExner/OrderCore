services:
  postgres:
    image: postgres:16-alpine
    container_name: ordercore-postgres
    environment:
      POSTGRES_DB: ordercore
      POSTGRES_USER: ordercore
      POSTGRES_PASSWORD: ordercore
    ports:
      - "5432:5432"
    volumes:
      - ordercore-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordercore -d ordercore"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ordercore-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ordercore
      RABBITMQ_DEFAULT_PASS: ordercore
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ordercore-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/OrderCore.Api/Dockerfile
    container_name: ordercore-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=ordercore;Username=ordercore;Password=ordercore
      Database__ApplyMigrations: "true"
      Outbox__Enabled: "true"
      Outbox__PollingIntervalSeconds: "10"
      Outbox__BatchSize: "20"
      Outbox__MaxRetryCount: "5"
      Messaging__OutboxPublisher: RabbitMq
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ordercore
      RabbitMq__Password: ordercore
      RabbitMq__VirtualHost: /
      RabbitMq__ExchangeName: ordercore.events
      RabbitMq__ExchangeType: topic
      RabbitMq__OrderPaidQueueName: ordercore.order-paid
      RabbitMq__DeclareTopology: "true"
      ORDERCORE_LOG_NETWORK_ENABLED: ${ORDERCORE_LOG_NETWORK_ENABLED:-false}
      ORDERCORE_LOG_NETWORK_ADDRESS: ${ORDERCORE_LOG_NETWORK_ADDRESS:-udp4://host.docker.internal:9998}
    ports:
      - "5282:8080"
    volumes:
      - ordercore-api-logs:/app/logs

  web:
    build:
      context: web/ordercore-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5282
    container_name: ordercore-web
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  ordercore-postgres-data:
  ordercore-api-logs:
  ordercore-rabbitmq-data:
